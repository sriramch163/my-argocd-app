apiVersion: v1
kind: ConfigMap
metadata:
  name: notes-nginx-config
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;

        location / {
          root /usr/share/nginx/html;
          index index.html;
        }

        location /api/ {
          proxy_pass http://notes-backend/;
        }
      }
    }