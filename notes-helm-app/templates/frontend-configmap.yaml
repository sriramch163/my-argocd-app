apiVersion: v1
kind: ConfigMap
metadata:
  name: notes-frontend-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <body>
      <h1>Notes App</h1>
      <input id="note" placeholder="Enter note"/>
      <button onclick="addNote()">Add</button>
      <button onclick="getNotes()">Show Notes</button>
      <pre id="output"></pre>

      <script>
        function addNote() {
          fetch('/api/notes', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: document.getElementById('note').value})
          });
        }

        function getNotes() {
          fetch('/api/notes')
            .then(res => res.json())
            .then(data => {
              document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            });
        }
      </script>
    </body>
    </html>